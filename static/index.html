<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLOv8 Vision AI 분석</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <h1>YOLOv8 Vision AI</h1>
        <p>인공지능 객체 인식 및 분석 시스템</p>
    </div>

    <div class="main-layout">
        <!-- Sidebar Controls -->
        <div class="panel controls-panel">
            <div class="upload-area" id="upload-area">
                <input type="file" id="file-input" accept="image/*">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <div class="upload-text">
                    클릭 또는 이미지를 <strong>드래그 앤 드롭</strong>하세요
                    <span id="file-name"></span>
                </div>
            </div>

            <!-- Tab bar -->
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="yolo">YOLO 감지</button>
                <button class="tab-btn" data-tab="features">특징점 추출</button>
            </div>

            <!-- Tab 1: YOLO Detection -->
            <div class="tab-content active" id="tab-yolo">
                <button class="analyze-btn" id="yolo-btn" onclick="analyzeYolo()">
                    <span class="spinner" id="yolo-spinner"></span>
                    <span id="yolo-btn-text">YOLO 감지 시작</span>
                </button>
                <div class="results-area" id="yolo-results">
                    <div class="empty-state">이미지를 업로드하고 분석을 시작하세요</div>
                </div>
            </div>

            <!-- Tab 2: Feature Extraction -->
            <div class="tab-content" id="tab-features">
                <div class="backbone-selector">
                    <div class="section-label">백본 모델</div>
                    <select class="backbone-select" id="backbone-select">
                        <option value="" disabled selected>로딩 중...</option>
                    </select>
                    <div class="backbone-info" id="backbone-info"></div>
                </div>
                <button class="analyze-btn" id="feat-btn" onclick="extractFeatures()">
                    <span class="spinner" id="feat-spinner"></span>
                    <span id="feat-btn-text">특징점 추출 시작</span>
                </button>
                <div class="results-area" id="feat-results">
                    <div class="empty-state">백본을 선택하고 이미지를 업로드하세요</div>
                </div>
            </div>
        </div>

        <!-- Main Preview Area -->
        <div class="panel preview-panel">
            <div class="placeholder-text" id="placeholder">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                이미지를 업로드하면 결과가 시각화됩니다
            </div>
            <div id="canvas-wrap">
                <canvas id="canvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        // ── Constants ──
        const CLASS_COLORS = {
            'bag':        '#EF4444',
            'sunglasses': '#F97316',
            'food_drink': '#F59E0B',
            'shoes':      '#10B981',
            'clothing':   '#06B6D4',
        };
        const FALLBACK_COLORS = ['#3B82F6', '#6366F1', '#EC4899', '#8B5CF6', '#14B8A6'];

        function getClassColor(className) {
            return CLASS_COLORS[className] || FALLBACK_COLORS[0];
        }

        // ── DOM refs ──
        const fileInput = document.getElementById('file-input');
        const uploadArea = document.getElementById('upload-area');
        const fileNameDisplay = document.getElementById('file-name');
        const placeholder = document.getElementById('placeholder');
        const canvasWrap = document.getElementById('canvas-wrap');

        let selectedFile = null;
        let backboneList = [];
        let lastYoloData = null;
        let lastFeatData = null;
        let lastFeatFeaturesBase64 = null;

        // ── Upload handling ──
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });
        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect() {
            if (fileInput.files.length > 0) {
                selectedFile = fileInput.files[0];
                fileNameDisplay.textContent = selectedFile.name;
            }
        }

        // ── Tab switching ──
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');

                // Re-render canvas for the active tab
                if (btn.dataset.tab === 'yolo' && lastYoloData) {
                    renderCanvasYolo();
                } else if (btn.dataset.tab === 'features' && lastFeatData) {
                    renderCanvasFeatures();
                }
            });
        });

        // ── Backbone loading ──
        async function loadBackbones() {
            const select = document.getElementById('backbone-select');
            try {
                const res = await fetch('/api');
                if (!res.ok) throw new Error('API 응답 에러');
                backboneList = await res.json();

                select.innerHTML = '';
                if (backboneList.length === 0) {
                    select.innerHTML = '<option value="" disabled selected>등록된 백본 없음</option>';
                    return;
                }

                const loadedCount = backboneList.filter(b => b.loaded).length;
                if (loadedCount === 0) {
                    select.innerHTML = '<option value="" disabled selected>로드된 백본 없음</option>';
                    updateBackboneInfo(null);
                    return;
                }

                backboneList.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b.name;
                    opt.textContent = b.displayName + (b.loaded ? '' : ' (미로드)');
                    opt.disabled = !b.loaded;
                    select.appendChild(opt);
                });

                // Select first loaded backbone
                const firstLoaded = backboneList.find(b => b.loaded);
                if (firstLoaded) {
                    select.value = firstLoaded.name;
                    updateBackboneInfo(firstLoaded);
                }
            } catch (e) {
                select.innerHTML = '<option value="" disabled selected>백본 로드 실패</option>';
                console.error(e);
            }
        }

        document.getElementById('backbone-select').addEventListener('change', (e) => {
            const b = backboneList.find(bb => bb.name === e.target.value);
            updateBackboneInfo(b);
        });

        function updateBackboneInfo(backbone) {
            const info = document.getElementById('backbone-info');
            if (!backbone) {
                info.innerHTML = '<span class="status-dot not-loaded"></span> 모델 파일이 로드되지 않았습니다';
                return;
            }
            const dotClass = backbone.loaded ? 'loaded' : 'not-loaded';
            const status = backbone.loaded ? '로드됨' : '미로드';
            info.innerHTML = `<span class="status-dot ${dotClass}"></span> ${status} &middot; 입력 크기: ${backbone.inputSize[0]} x ${backbone.inputSize[1]}`;
        }

        // ── Ensure file selected ──
        function ensureFile() {
            if (!selectedFile) {
                if (fileInput.files.length > 0) {
                    selectedFile = fileInput.files[0];
                } else {
                    alert('먼저 이미지를 선택해주세요.');
                    return false;
                }
            }
            return true;
        }

        // ══════════════════════════════════════════
        // Tab 1: YOLO Detection
        // ══════════════════════════════════════════

        async function analyzeYolo() {
            if (!ensureFile()) return;

            const btn = document.getElementById('yolo-btn');
            const btnText = document.getElementById('yolo-btn-text');
            const spinner = document.getElementById('yolo-spinner');

            btnText.textContent = '분석 진행 중...';
            spinner.style.display = 'block';
            btn.disabled = true;

            try {
                const form = new FormData();
                form.append('file', selectedFile);
                const res = await fetch('/visualize/', { method: 'POST', body: form });
                if (!res.ok) throw new Error('API 응답 에러');
                lastYoloData = await res.json();
                renderDetectionStats(lastYoloData.detections);
                renderCanvasYolo();
            } catch (error) {
                document.getElementById('yolo-results').innerHTML =
                    `<div class="stat-card" style="color:#ef4444">분석 실패: ${error.message}</div>`;
                console.error(error);
            } finally {
                btnText.textContent = 'YOLO 감지 시작';
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        }

        function renderCanvasYolo() {
            if (!lastYoloData || !selectedFile) return;
            const img = new Image();
            img.onload = () => {
                placeholder.style.display = 'none';
                canvasWrap.style.display = 'flex';
                drawBoxes(img, lastYoloData.detections);
            };
            img.src = URL.createObjectURL(selectedFile);
        }

        function renderDetectionStats(detections) {
            const container = document.getElementById('yolo-results');

            if (!detections || detections.length === 0) {
                container.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-summary">
                            <div>
                                <div class="stat-big-number">0</div>
                                <div class="stat-big-label">감지된 객체</div>
                            </div>
                        </div>
                        <div style="color:var(--text-muted); font-size:0.85rem;">감지된 객체가 없습니다.</div>
                    </div>
                    ${jsonDetailsHtml(detections)}`;
                return;
            }

            // Compute stats
            const byClass = {};
            detections.forEach(d => {
                if (!byClass[d.class]) byClass[d.class] = { count: 0, confs: [] };
                byClass[d.class].count++;
                byClass[d.class].confs.push(d.confidence);
            });
            Object.values(byClass).forEach(c => {
                c.min = Math.min(...c.confs);
                c.max = Math.max(...c.confs);
                c.avg = c.confs.reduce((a, b) => a + b, 0) / c.confs.length;
            });
            const maxCount = Math.max(...Object.values(byClass).map(c => c.count));

            // Badges HTML
            const badgesHtml = Object.entries(byClass).map(([cls, data]) => {
                const color = getClassColor(cls);
                return `<span class="class-badge" style="background:${color}">${cls} <span class="badge-count">${data.count}</span></span>`;
            }).join('');

            // Confidence table HTML
            const tableRows = Object.entries(byClass).map(([cls, data]) => {
                const color = getClassColor(cls);
                return `<tr>
                    <td><span class="class-dot" style="background:${color}"></span>${cls}</td>
                    <td style="text-align:center">${data.count}</td>
                    <td style="font-variant-numeric:tabular-nums">${data.min.toFixed(3)}</td>
                    <td style="font-variant-numeric:tabular-nums">${data.max.toFixed(3)}</td>
                    <td>
                        <div style="display:flex;align-items:center;gap:6px">
                            <span style="font-variant-numeric:tabular-nums;font-weight:600;min-width:38px">${data.avg.toFixed(3)}</span>
                            <div class="conf-bar-wrap"><div class="conf-bar" style="width:${data.avg * 100}%;background:${color}"></div></div>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            // Distribution bars HTML
            const distHtml = Object.entries(byClass).map(([cls, data]) => {
                const color = getClassColor(cls);
                const pct = (data.count / detections.length * 100);
                return `<div class="dist-row">
                    <span class="dist-label">${cls}</span>
                    <div class="dist-bar-wrap">
                        <div class="dist-bar" style="width:${(data.count / maxCount * 100)}%;background:${color}">${data.count}</div>
                    </div>
                </div>`;
            }).join('');

            container.innerHTML = `
                <div class="stat-card">
                    <div class="stat-summary">
                        <div>
                            <div class="stat-big-number">${detections.length}</div>
                            <div class="stat-big-label">감지된 객체</div>
                        </div>
                        <div class="class-badges">${badgesHtml}</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="section-label">클래스별 Confidence</div>
                    <table class="conf-table">
                        <tr><th>클래스</th><th style="text-align:center">수량</th><th>Min</th><th>Max</th><th>Avg</th></tr>
                        ${tableRows}
                    </table>
                </div>

                <div class="stat-card">
                    <div class="section-label">클래스 분포</div>
                    ${distHtml}
                </div>

                ${jsonDetailsHtml(detections)}`;
        }

        function jsonDetailsHtml(data) {
            return `<details class="json-details">
                <summary>원본 JSON 응답</summary>
                <pre class="json-output">${JSON.stringify({detections: data}, null, 2)}</pre>
            </details>`;
        }

        // ══════════════════════════════════════════
        // Tab 2: Feature Extraction
        // ══════════════════════════════════════════

        async function extractFeatures() {
            if (!ensureFile()) return;
            const backboneName = document.getElementById('backbone-select').value;
            if (!backboneName) {
                alert('백본 모델을 선택해주세요.');
                return;
            }

            const btn = document.getElementById('feat-btn');
            const btnText = document.getElementById('feat-btn-text');
            const spinner = document.getElementById('feat-spinner');

            btnText.textContent = '추출 진행 중...';
            spinner.style.display = 'block';
            btn.disabled = true;

            try {
                const form = new FormData();
                form.append('file', selectedFile);
                const res = await fetch(`/api/${backboneName}/process-image/`, { method: 'POST', body: form });
                if (!res.ok) throw new Error('API 응답 에러');
                lastFeatData = await res.json();
                lastFeatFeaturesBase64 = lastFeatData.featuresBase64;
                renderFeatureResults(lastFeatData, backboneName);
                renderCanvasFeatures();
            } catch (error) {
                document.getElementById('feat-results').innerHTML =
                    `<div class="stat-card" style="color:#ef4444">추출 실패: ${error.message}</div>`;
                console.error(error);
            } finally {
                btnText.textContent = '특징점 추출 시작';
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        }

        function renderCanvasFeatures() {
            if (!lastFeatData || !selectedFile) return;
            const img = new Image();
            img.onload = () => {
                placeholder.style.display = 'none';
                canvasWrap.style.display = 'flex';
                drawBoxes(img, lastFeatData.detections, lastFeatData.coordinate);
            };
            img.src = URL.createObjectURL(selectedFile);
        }

        function renderFeatureResults(data, backboneName) {
            const container = document.getElementById('feat-results');
            const backbone = backboneList.find(b => b.name === backboneName);
            const displayName = backbone ? backbone.displayName : backboneName;

            // Detection info
            let detInfoHtml;
            if (data.detectedClass) {
                const color = getClassColor(data.detectedClass);
                detInfoHtml = `
                    <div class="detection-info">
                        <span class="det-class-badge" style="background:${color}">${data.detectedClass}</span>
                        <div class="det-confidence">
                            <span class="value">${(data.confidence * 100).toFixed(1)}%</span>
                            <div class="conf-bar-wrap" style="width:80px">
                                <div class="conf-bar" style="width:${data.confidence * 100}%;background:${color}"></div>
                            </div>
                        </div>
                        <span class="det-coords">[${data.coordinate.join(', ')}]</span>
                    </div>`;
            } else {
                detInfoHtml = `<div class="det-warning">YOLO 감지 실패 - 원본 이미지로 추출됨</div>`;
            }

            // Channel chips
            let channels = [];
            try { channels = JSON.parse(data.order); } catch (e) {}
            const chipsHtml = channels.map((ch, i) =>
                `<span class="chip ${i < 5 ? 'highlight' : 'muted'}">${ch}</span>`
            ).join('');

            // Features info
            const b64Len = data.featuresBase64.length;
            const rawBytes = Math.ceil(b64Len * 3 / 4);

            container.innerHTML = `
                <div class="stat-card">
                    <div class="section-label">YOLO 감지 (${displayName})</div>
                    ${detInfoHtml}
                </div>

                <div class="stat-card">
                    <div class="section-label">상위 ${channels.length} 채널 인덱스 (GAP 기준)</div>
                    <div class="channel-chips">${chipsHtml}</div>
                </div>

                <div class="stat-card">
                    <div class="section-label">특징점 데이터</div>
                    <div class="info-row">
                        <span class="label">Base64 길이</span>
                        <span class="value">${b64Len.toLocaleString()} chars</span>
                    </div>
                    <div class="info-row">
                        <span class="label">원본 크기</span>
                        <span class="value">${rawBytes.toLocaleString()} bytes</span>
                    </div>
                    <div class="info-row">
                        <span class="label">featuresBase64</span>
                        <button class="copy-btn" onclick="copyFeatures(this)">복사</button>
                    </div>
                </div>

                <details class="json-details">
                    <summary>원본 JSON 응답</summary>
                    <pre class="json-output">${JSON.stringify(data, null, 2)}</pre>
                </details>`;
        }

        function copyFeatures(btn) {
            if (!lastFeatFeaturesBase64) return;
            navigator.clipboard.writeText(lastFeatFeaturesBase64).then(() => {
                btn.textContent = '복사됨';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '복사';
                    btn.classList.remove('copied');
                }, 1500);
            });
        }

        // ══════════════════════════════════════════
        // Canvas Drawing
        // ══════════════════════════════════════════

        function drawBoxes(img, detections, highlightCoord) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            if (!detections || detections.length === 0) return;

            const lineWidth = Math.max(3, img.width / 400);
            const fontSize = Math.max(16, img.width / 60);

            detections.forEach((d) => {
                const color = getClassColor(d.class);
                const [x1, y1, x2, y2] = d.coordinate;
                const width = x2 - x1;
                const height = y2 - y1;

                ctx.strokeStyle = color;
                ctx.lineWidth = lineWidth;

                ctx.shadowColor = color;
                ctx.shadowBlur = 12;
                ctx.strokeRect(x1, y1, width, height);
                ctx.shadowBlur = 0;
                ctx.strokeRect(x1, y1, width, height);

                const confidence = d.confidence ? d.confidence.toFixed(2) : '';
                const text = `${d.class} ${confidence}`;

                ctx.font = `bold ${fontSize}px 'Inter', sans-serif`;

                const padding = fontSize * 0.4;
                const textMetrics = ctx.measureText(text);
                const textWidth = textMetrics.width;
                const textHeight = fontSize;

                ctx.fillStyle = color;
                ctx.fillRect(
                    x1 - lineWidth / 2,
                    y1 - textHeight - (padding * 2),
                    textWidth + (padding * 2),
                    textHeight + (padding * 2)
                );

                ctx.fillStyle = '#ffffff';
                ctx.textBaseline = 'top';
                ctx.fillText(text, x1 + padding, y1 - textHeight - padding);
            });

            // Highlight the crop region (feature extraction tab)
            if (highlightCoord) {
                const [hx1, hy1, hx2, hy2] = highlightCoord;
                const hw = hx2 - hx1;
                const hh = hy2 - hy1;

                // Dim everything outside the crop
                ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
                // Top
                ctx.fillRect(0, 0, img.width, hy1);
                // Bottom
                ctx.fillRect(0, hy2, img.width, img.height - hy2);
                // Left
                ctx.fillRect(0, hy1, hx1, hh);
                // Right
                ctx.fillRect(hx2, hy1, img.width - hx2, hh);

                // Dashed border around crop
                ctx.setLineDash([8, 6]);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = Math.max(2, img.width / 300);
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 6;
                ctx.strokeRect(hx1, hy1, hw, hh);
                ctx.shadowBlur = 0;
                ctx.setLineDash([]);

                // "CROP" label
                const cropFontSize = Math.max(12, img.width / 80);
                ctx.font = `bold ${cropFontSize}px 'Inter', sans-serif`;
                const cropText = 'CROP';
                const cropMetrics = ctx.measureText(cropText);
                const cropPad = cropFontSize * 0.3;
                ctx.fillStyle = 'rgba(79, 70, 229, 0.85)';
                ctx.fillRect(hx1, hy2 + 2, cropMetrics.width + cropPad * 2, cropFontSize + cropPad * 2);
                ctx.fillStyle = '#ffffff';
                ctx.textBaseline = 'top';
                ctx.fillText(cropText, hx1 + cropPad, hy2 + 2 + cropPad);
            }
        }

        // ── Init ──
        loadBackbones();
    </script>
</body>
</html>
