<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLOv8 Vision AI 분석</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.06);
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 10%, rgba(79, 70, 229, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(14, 165, 233, 0.06) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0f172a, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            animation: fadeIn 1s ease-out;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.8rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
        }

        /* Upload styling */
        .upload-area {
            border: 2px dashed rgba(79, 70, 229, 0.3);
            border-radius: 14px;
            padding: 2.5rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            background: rgba(79, 70, 229, 0.02);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(79, 70, 229, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .upload-area:hover::before {
            transform: translateX(100%);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent-hover);
            background: rgba(79, 70, 229, 0.06);
            transform: translateY(-2px);
        }

        .upload-area input[type=file] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
            z-index: 10;
        }

        .upload-area svg {
            width: 54px;
            height: 54px;
            fill: none;
            stroke: var(--accent-color);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-bottom: 1rem;
            transition: transform 0.3s;
        }

        .upload-area:hover svg {
            transform: scale(1.1);
        }

        .upload-text {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .upload-text strong {
            color: var(--accent-hover);
            font-weight: 600;
        }

        #file-name {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #475569;
            word-break: break-all;
        }

        button.analyze-btn {
            background: linear-gradient(135deg, var(--accent-color), #6366f1);
            color: white;
            border: none;
            padding: 1.1rem;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.25);
        }

        button.analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.35);
            background: linear-gradient(135deg, var(--accent-hover), var(--accent-color));
        }

        button.analyze-btn:active {
            transform: translateY(0);
        }

        button.analyze-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Results / JSON */
        .results-section {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .results-header {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .results-header svg {
            width: 20px;
            height: 20px;
            stroke: var(--accent-color);
        }

        #json-output {
            background: #f1f5f9;
            color: #059669;
            padding: 1.2rem;
            border-radius: 12px;
            overflow-y: auto;
            flex: 1;
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            max-height: 400px;
            white-space: pre-wrap;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            font-weight: 500;
        }

        #json-output::-webkit-scrollbar {
            width: 8px;
        }
        #json-output::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 8px;
        }
        #json-output::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }

        /* Canvas area */
        .preview-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 500px;
            position: relative;
            background: rgba(248, 250, 252, 0.5);
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            animation: pulse 2s infinite;
        }
        
        .placeholder-text svg {
            width: 80px;
            height: 80px;
            stroke: rgba(148, 163, 184, 0.6);
            stroke-width: 1;
            fill: none;
        }

        #canvas-wrap {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
        }

        canvas {
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            max-width: 100%;
            max-height: 75vh;
            object-fit: contain;
            border: 1px solid var(--border-color);
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        @media (max-width: 960px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            .preview-panel {
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>YOLOv8 Vision AI</h1>
        <p>인공지능 객체 인식 및 분석 시스템</p>
    </div>

    <div class="main-layout">
        <!-- Sidebar Controls -->
        <div class="panel controls-panel">
            <div class="upload-area" id="upload-area">
                <input type="file" id="file-input" accept="image/*">
                <!-- Upload Icon -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <div class="upload-text">
                    클릭 또는 이미지를 <strong>드래그 앤 드롭</strong>하세요
                    <span id="file-name"></span>
                </div>
            </div>

            <div style="margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; background: rgba(79, 70, 229, 0.03); padding: 1rem; border-radius: 12px; border: 1px solid rgba(79, 70, 229, 0.1);">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="rembg-toggle" checked style="width: 18px; height: 18px; cursor: pointer;">
                    <label for="rembg-toggle" style="font-size: 0.95rem; color: var(--text-main); cursor: pointer; font-weight: 600;">
                        배경 제거(rembg) 활성화
                    </label>
                </div>

                <div id="rembg-options" style="display: flex; flex-direction: column; gap: 0.6rem; padding-left: 1.6rem; border-left: 2px solid rgba(79, 70, 229, 0.1);">
                    <div style="display: flex; flex-direction: column; gap: 4px;">
                        <label style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">모델 선택 (Model)</label>
                        <select id="rembg-model" style="padding: 0.4rem; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 0.85rem; background: white;">
                            <option value="birefnet-general">birefnet-general (최고 품질/매우 무거움)</option>
                            <option value="birefnet-general-lite" selected>birefnet-general-lite (품질/속도 균형)</option>
                            <option value="isnet-general-use">isnet-general-use (무난함/추천)</option>
                            <option value="u2net">u2net (기본)</option>
                            <option value="silueta">silueta (매우 빠름)</option>
                            <option value="u2net_cloth_seg">u2net_cloth_seg (의류)</option>
                            <option value="birefnet-portrait">birefnet-portrait (인물 특화)</option>
                        </select>
                    </div>
                    
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="rembg-alpha" style="width: 15px; height: 15px; cursor: pointer;">
                        <label for="rembg-alpha" style="font-size: 0.85rem; color: var(--text-main); cursor: pointer;">
                            Alpha Matting 적용 (정밀한 테두리)
                        </label>
                    </div>
                </div>
            </div>

            <button class="analyze-btn" id="analyze-btn" onclick="analyze()">
                <span class="spinner" id="spinner"></span>
                <span id="btn-text">이미지 분석 시작</span>
            </button>

            <div class="results-section">
                <div class="results-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                    분석 결과 (JSON Format)
                </div>
                <pre id="json-output">// 결과 데이터가 여기에 표시됩니다...</pre>
            </div>
        </div>

        <!-- Main Preview Area -->
        <div class="panel preview-panel">
            <div class="placeholder-text" id="placeholder">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                이미지를 업로드하면 결과가 시각화됩니다
            </div>
            <div id="canvas-wrap">
                <canvas id="canvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadArea = document.getElementById('upload-area');
        const fileNameDisplay = document.getElementById('file-name');
        const analyzeBtn = document.getElementById('analyze-btn');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('spinner');
        const placeholder = document.getElementById('placeholder');
        const canvasWrap = document.getElementById('canvas-wrap');
        const jsonOutput = document.getElementById('json-output');

        let selectedFile = null;

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });

        fileInput.addEventListener('change', handleFileSelect);

        const rembgToggle = document.getElementById('rembg-toggle');
        const rembgOptions = document.getElementById('rembg-options');

        rembgToggle.addEventListener('change', () => {
            rembgOptions.style.opacity = rembgToggle.checked ? '1' : '0.4';
            rembgOptions.style.pointerEvents = rembgToggle.checked ? 'auto' : 'none';
        });

        function handleFileSelect() {
            if (fileInput.files.length > 0) {
                selectedFile = fileInput.files[0];
                fileNameDisplay.textContent = selectedFile.name;
            }
        }

        async function analyze() {
            if (!selectedFile) {
                if (fileInput.files.length > 0) {
                    selectedFile = fileInput.files[0];
                } else {
                    alert('먼저 이미지를 선택해주세요.');
                    return;
                }
            }

            btnText.textContent = '분석 진행 중...';
            spinner.style.display = 'block';
            analyzeBtn.disabled = true;

            try {
                const useRembg = document.getElementById('rembg-toggle').checked;
                const model = document.getElementById('rembg-model').value;
                const alpha = document.getElementById('rembg-alpha').checked;
                
                const form = new FormData();
                form.append('file', selectedFile);

                const queryParams = new URLSearchParams({
                    use_rembg: useRembg,
                    model: model,
                    alpha_matting: alpha
                });

                const res = await fetch(`/visualize/?${queryParams.toString()}`, { method: 'POST', body: form });
                if (!res.ok) throw new Error('API 응답 에러');
                const data = await res.json();

                jsonOutput.textContent = JSON.stringify(data, null, 2);

                const img = new Image();
                img.onload = () => {
                    placeholder.style.display = 'none';
                    canvasWrap.style.display = 'flex';
                    drawBoxes(img, data.detections);
                };
                
                if (data.rembgImage) {
                    img.src = `data:image/png;base64,${data.rembgImage}`;
                } else {
                    img.src = URL.createObjectURL(selectedFile);
                }
            } catch (error) {
                alert('분석에 실패했습니다. 서버를 확인해주세요.');
                console.error(error);
                jsonOutput.textContent = `// 오류 발생:\n${error.message}`;
            } finally {
                btnText.textContent = '이미지 분석 시작';
                spinner.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        }

        function drawBoxes(img, detections) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const colors = [
                '#EF4444', '#F97316', '#F59E0B', '#10B981', 
                '#06B6D4', '#3B82F6', '#6366F1', '#EC4899',
                '#8B5CF6', '#14B8A6'
            ];

            if (!detections || detections.length === 0) return;

            detections.forEach((d, i) => {
                const color = colors[i % colors.length];
                const [x1, y1, x2, y2] = d.coordinate;
                const width = x2 - x1;
                const height = y2 - y1;

                const lineWidth = Math.max(3, img.width / 400);
                
                ctx.strokeStyle = color;
                ctx.lineWidth = lineWidth;
                
                ctx.shadowColor = color;
                ctx.shadowBlur = 12;
                ctx.strokeRect(x1, y1, width, height);
                ctx.shadowBlur = 0; 

                ctx.strokeRect(x1, y1, width, height);

                const confidence = d.confidence ? (d.confidence).toFixed(2) : '';
                const text = `${d.class} ${confidence}`;
                const fontSize = Math.max(16, img.width / 60);
                
                ctx.font = `bold ${fontSize}px 'Inter', sans-serif`;
                
                const padding = fontSize * 0.4;
                const textMetrics = ctx.measureText(text);
                const textWidth = textMetrics.width;
                const textHeight = fontSize;

                ctx.fillStyle = color;
                ctx.fillRect(
                    x1 - lineWidth/2, 
                    y1 - textHeight - (padding * 2), 
                    textWidth + (padding * 2), 
                    textHeight + (padding * 2)
                );

                ctx.fillStyle = '#ffffff';
                ctx.textBaseline = 'top';
                ctx.fillText(text, x1 + padding, y1 - textHeight - padding);
            });
        }
    </script>
</body>
</html>
